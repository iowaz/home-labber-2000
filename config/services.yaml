- id: qbittorrent
  description: qBittorrent web UI (running on Mac)
  origin:
    server: nucbox
    port: 8872
    healthcheck:
      url_path: /
  publish:
    caddy:
      via: nucbox
      hostname: qbittorrent.rede.local
      aliases:
        - torrent.rede.local
    cloudflare-tunnel:
      via: nucbox
      hostname: qbittorrent-mac.diogocasteluber.com.br
      path: "*"
  dns:
    from_publish: caddy

